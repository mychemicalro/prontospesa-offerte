<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pronto Spesa — Offerte</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" />
</head>
<body>
  <header>
    <div class="container">
      <h1>🛒 Pronto Spesa — Offerte</h1>
      <p class="subtitle">Migliori offerte PEWEX, aggiornate ogni giorno</p>
      <div class="meta">
        <span id="lastUpdate">Caricamento...</span>
        <span id="totalDeals"></span>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Filtri -->
    <div class="filters">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cerca prodotto, marca..." autocomplete="off" />
      </div>
      <div class="filter-group">
        <select id="categoryFilter">
          <option value="">Tutte le categorie</option>
        </select>
        <select id="sortBy">
          <option value="discount">Sconto % ↓</option>
          <option value="price">Prezzo ↑</option>
          <option value="name">Nome A-Z</option>
          <option value="expire">Scadenza ↑</option>
        </select>
        <select id="minDiscount">
          <option value="0">Tutti</option>
          <option value="30">≥ 30%</option>
          <option value="40">≥ 40%</option>
          <option value="50">≥ 50%</option>
        </select>
      </div>
      <div class="stats-bar">
        <span id="resultsCount"></span>
      </div>
    </div>

    <!-- Griglia offerte -->
    <div id="dealsGrid" class="deals-grid"></div>

    <!-- Pulsante carica altro -->
    <div id="loadMoreContainer" class="load-more">
      <button id="loadMoreBtn" class="btn" style="display:none">Mostra altre offerte</button>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Dati aggiornati automaticamente ogni mattina alle 07:20 · Fonte: <a href="https://pewex.it" target="_blank">PEWEX/Pronto Spesa</a></p>
      <p class="footer-small">I prezzi potrebbero variare · Verifica sempre in negozio</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
