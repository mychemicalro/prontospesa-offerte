<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pronto Spesa — Catalogo & Offerte</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" />
</head>
<body>
  <header>
    <div class="container">
      <h1>🛒 Pronto Spesa</h1>
      <p class="subtitle">Catalogo PEWEX + CTS — offerte e prezzi, aggiornati ogni giorno</p>
      <div class="meta">
        <span id="lastUpdate">Caricamento...</span>
        <span id="totalInfo"></span>
      </div>
    </div>
  </header>

  <!-- Supermercato Tabs -->
  <div class="sm-tabs container">
    <button class="sm-tab active" data-sm="all" id="smAll">🏪 Tutti</button>
    <button class="sm-tab" data-sm="pewex" id="smPewex">🟢 PEWEX</button>
    <button class="sm-tab" data-sm="cts" id="smCts">🟠 CTS</button>
  </div>

  <!-- Tab Navigator -->
  <div class="tabs container">
    <button class="tab-btn active" data-tab="deals" id="tabDeals">🔥 In Offerta</button>
    <button class="tab-btn" data-tab="catalog" id="tabCatalog">📦 Tutti i prodotti</button>
  </div>

  <main class="container">
    <!-- Filtri -->
    <div class="filters">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cerca prodotto, marca..." autocomplete="off" />
      </div>
      <div class="filter-group">
        <select id="categoryFilter">
          <option value="">Tutte le categorie</option>
        </select>
        <select id="sortBy">
          <option value="discount">Sconto % ↓</option>
          <option value="price">Prezzo ↑</option>
          <option value="price-desc">Prezzo ↓</option>
          <option value="name">Nome A-Z</option>
        </select>
        <select id="minDiscount" class="deals-only">
          <option value="0">Tutti</option>
          <option value="30">≥ 30% sconto</option>
          <option value="40">≥ 40% sconto</option>
          <option value="50">≥ 50% sconto</option>
        </select>
      </div>
      <div class="stats-bar">
        <span id="resultsCount"></span>
        <span id="catalogHint" class="catalog-hint" style="display:none">🔍 Premi Invio per cercare</span>
      </div>
    </div>

    <!-- Sezione Offerte -->
    <div id="dealsSection" class="tab-content active">
      <div id="dealsGrid" class="deals-grid"></div>
    </div>

    <!-- Sezione Catalogo -->
    <div id="catalogSection" class="tab-content">
      <div id="catalogGrid" class="catalog-grid"></div>
    </div>

    <!-- Load More -->
    <div id="loadMoreContainer" class="load-more">
      <button id="loadMoreBtn" class="btn" style="display:none">Mostra altri risultati</button>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Dati aggiornati automaticamente ogni mattina · Fonti: <a href="https://pewex.it" target="_blank">PEWEX</a> · <a href="https://www.ctsspesaonline.it/" target="_blank">CTS</a></p>
      <p class="footer-small">I prezzi potrebbero variare · Verifica sempre in negozio</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
